<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Campus Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="project-panel.html">Campus Connect</a>
    <nav class="nav-links">
      <a href="project-panel.html">Project panel</a>
      <a href="index.html">Post opportunity</a>
      <a href="register.html">Register</a>
    </nav>
  </div>
</header>

<main class="auth-wrap">
  <h1>Welcome back</h1>
  <p class="lede">Log in with your PRN and password to post or manage opportunities.</p>

  <form id="loginForm" novalidate>
    <label for="prn">PRN</label>
    <input type="text" id="prn" name="prn" maxlength="20" placeholder="e.g. 22070123456" required>

    <label for="password">Password</label>
    <div class="password-row">
      <input type="password" id="password" name="password" placeholder="Your password" required>
      <button type="button" class="toggle-pass" data-target="password">Show</button>
    </div>

    <button type="submit" class="submit-btn" id="loginBtn">
      <span>Log in</span>
    </button>
    <div id="loginMessage" class="form-message" role="status" aria-live="polite"></div>
  </form>

  <p class="auth-footnote">New here? <a href="register.html">Create an account</a></p>
</main>

<script src="auth.js"></script>
</body>
</html>
